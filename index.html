<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SGSO · Contador de Seguridad</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f3f6fb;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 1rem;
  }
  .card {
    background: #ffffff;
    border-radius: 16px;
    border: 1px solid #d0dff0;
    padding: 2.5rem 2rem 2rem;
    max-width: 480px;
    width: 100%;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .runway {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 5px;
    background: repeating-linear-gradient(
      90deg, #185FA5 0px, #185FA5 28px, transparent 28px, transparent 44px
    );
    opacity: 0.13;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 1.8rem;
  }
  .plane-icon {
    width: 36px; height: 36px;
  }
  .org-name {
    font-size: 13px;
    font-weight: 600;
    color: #185FA5;
    letter-spacing: 0.09em;
    text-transform: uppercase;
  }
  .org-sub {
    font-size: 11px;
    color: #6b8cae;
    letter-spacing: 0.06em;
  }
  .days-big {
    font-size: 108px;
    font-weight: 300;
    color: #185FA5;
    line-height: 1;
    letter-spacing: -6px;
  }
  .days-label {
    font-size: 12px;
    color: #6b8cae;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-top: 6px;
  }
  .divider {
    border: none;
    border-top: 1px solid #e4ecf5;
    margin: 1.4rem 0 1.2rem;
  }
  .stats {
    display: flex;
    justify-content: center;
    gap: 2rem;
  }
  .stat-item { text-align: center; }
  .stat-val {
    font-size: 24px;
    font-weight: 500;
    color: #1a3a5c;
  }
  .stat-lbl {
    font-size: 10px;
    color: #8aa5bf;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .badge {
    display: inline-block;
    margin-top: 1.2rem;
    padding: 4px 16px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .badge-green { background: #EAF3DE; color: #3B6D11; }
  .badge-amber { background: #FAEEDA; color: #854F0B; }
  .badge-red   { background: #FCEBEB; color: #A32D2D; }
  .footer {
    margin-top: 1.4rem;
    font-size: 10px;
    color: #aabcce;
    letter-spacing: 0.07em;
    text-transform: uppercase;
  }
  .progress-bar-wrap {
    background: #e8f0f9;
    border-radius: 99px;
    height: 6px;
    margin: 1.2rem 0 0.3rem;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 99px;
    background: #185FA5;
    transition: width 1s ease;
  }
  .progress-label {
    font-size: 10px;
    color: #8aa5bf;
    text-align: right;
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <svg class="plane-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="36" height="36" rx="8" fill="#E6F1FB"/>
      <path d="M8 24 Q18 11 28 24" stroke="#185FA5" stroke-width="1.4" fill="none" stroke-dasharray="3 2"/>
      <path d="M14 21 L18 15 L28 20 L20 22 Z" fill="#185FA5"/>
      <rect x="16.5" y="22" width="3" height="4" rx="1" fill="#185FA5" opacity="0.65"/>
    </svg>
    <div>
      <div class="org-name">SGSO · Aeropuerto</div>
      <div class="org-sub">Seguridad Operacional · PQM</div>
    </div>
  </div>

  <div class="days-big" id="daysNum">0</div>
  <div class="days-label">días sin accidente</div>

  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progBar" style="width:0%"></div>
  </div>
  <div class="progress-label" id="progLabel">0% hacia la meta de 90 días</div>

  <hr class="divider"/>

  <div class="stats">
    <div class="stat-item">
      <div class="stat-val" id="semanas">0</div>
      <div class="stat-lbl">Semanas</div>
    </div>
    <div class="stat-item">
      <div class="stat-val" id="meses">0</div>
      <div class="stat-lbl">Meses</div>
    </div>
    <div class="stat-item">
      <div class="stat-val" id="anios">0</div>
      <div class="stat-lbl">Años</div>
    </div>
  </div>

  <div id="badgeZone"></div>

  <div class="footer" id="sinceLabel">Desde: —</div>
  <div class="footer" id="reloj" style="margin-top:4px;"></div>
  <div class="runway"></div>
</div>

<script>
  // ============================================================
  // CONFIGURA AQUÍ: cambia esta fecha al día del último accidente
  // Formato: 'AAAA-MM-DD'
  var FECHA_ULTIMO_ACCIDENTE = '2026-01-13';

  // Meta de días sin accidente
  var META_DIAS = 365;
  // ============================================================

  function diffDias(desde) {
    var d1 = new Date(desde + 'T00:00:00');
    var d2 = new Date();
    d2.setHours(0,0,0,0);
    return Math.max(0, Math.floor((d2 - d1) / 86400000));
  }

  function formatFecha(iso) {
    var p = iso.split('-');
    return p[2] + '/' + p[1] + '/' + p[0];
  }

  function actualizar() {
    var dias = diffDias(FECHA_ULTIMO_ACCIDENTE);
    document.getElementById('daysNum').textContent = dias;
    document.getElementById('semanas').textContent = Math.floor(dias / 7);
    document.getElementById('meses').textContent = Math.floor(dias / 30);
    document.getElementById('anios').textContent = (dias / 365).toFixed(1);
    document.getElementById('sinceLabel').textContent = 'Desde: ' + formatFecha(FECHA_ULTIMO_ACCIDENTE);

    var prog = Math.min(100, Math.round((dias / META_DIAS) * 100));
    document.getElementById('progBar').style.width = prog + '%';
    document.getElementById('progLabel').textContent = prog + '% hacia la meta de ' + META_DIAS + ' días';

    var badge = '';
    if (dias === 0) {
      badge = '<span class="badge badge-red">Reiniciado hoy</span>';
    } else if (dias >= META_DIAS) {
      badge = '<span class="badge badge-green">Meta alcanzada</span>';
    } else if (dias >= META_DIAS * 0.7) {
      badge = '<span class="badge badge-amber">Cerca de la meta</span>';
    } else {
      badge = '<span class="badge badge-red">En progreso</span>';
    }
    document.getElementById('badgeZone').innerHTML = badge;
  }

  function reloj() {
    var now = new Date();
    var hora = now.toLocaleTimeString('es-MX', {hour:'2-digit', minute:'2-digit'});
    var fecha = now.toLocaleDateString('es-MX', {weekday:'long', day:'2-digit', month:'long', year:'numeric'});
    document.getElementById('reloj').textContent = hora + ' · ' + fecha;
  }

  actualizar();
  reloj();
  setInterval(reloj, 30000);
</script>
</body>
</html>
